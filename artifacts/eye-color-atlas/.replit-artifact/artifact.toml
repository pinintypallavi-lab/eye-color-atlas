kind = "web"
previewPath = "/"
title = "Eye Color Atlas"
version = "1.0.0"
id = "artifacts/eye-color-atlas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25593

[services.development]
run = "pnpm --filter @workspace/eye-color-atlas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eye-color-atlas", "run", "build" ]
publicDir = "artifacts/eye-color-atlas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25593"
BASE_PATH = "/"
